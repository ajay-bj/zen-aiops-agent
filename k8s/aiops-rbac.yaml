# ServiceAccount with IRSA annotation (links to AWS IAM role)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent
  namespace: prod
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::304312474711:role/aiops-agent-role
---
# ClusterRole — what the agent is allowed to do
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-agent-role
rules:
  # READ: pods, logs, events, services, configmaps, deployments
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  # WRITE: delete pods (restart), patch deployments (rollback/scale)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
---
# ClusterRoleBinding — binds the role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-agent-binding
subjects:
  - kind: ServiceAccount
    name: aiops-agent
    namespace: prod
roleRef:
  kind: ClusterRole
  name: aiops-agent-role
  apiGroup: rbac.authorization.k8s.io
